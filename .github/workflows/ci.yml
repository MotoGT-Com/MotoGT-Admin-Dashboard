name: CI - Continuous Integration

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  quality-check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 8

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install

      - name: Lint code
        run: pnpm lint || echo "Linting skipped or failed"

      - name: Build application
        run: pnpm build
        env:
          NEXT_PUBLIC_API_BASE_URL: https://api.motogt.com/api

      - name: Build Summary
        run: |
          echo "✅ Build completed successfully!"
          echo "📦 Build artifacts are ready for deployment"
